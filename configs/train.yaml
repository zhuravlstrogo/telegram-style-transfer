# Fine-tuning hyperparameters used by scripts/finetune.py.
# This is the canonical training config under configs/.

base_model: "Qwen/Qwen2.5-3B-Instruct"
load_in_4bit: true
max_seq_length: 768
lora_r: 16
lora_alpha: 16
lora_dropout: 0.05
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
eval_accumulation_steps: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3
eval_steps: 50
save_steps: 50
seed: 42
