# Runtime environment profiles.
# Set the active profile by passing --env to scripts, or by setting ENV_PROFILE env var.
# Usage: python scripts/finetune.py --env mac_m1
#        ENV_PROFILE=ubuntu_t4 python scripts/finetune.py

profiles:

  cpu:
    description: "Generic CPU-only machine — inference and light eval only"
    hardware:
      cpu_cores: null
      ram_gb: null
      gpu: null
      disk_gb: null
    python_env:
      device: cpu

    finetune:
      enabled: false
      reason: "QLoRA / Unsloth training in this repo requires CUDA"

    inference:
      device: cpu
      load_in_4bit: false
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256
      do_sample: true
      batch_size: 1

    eval:
      mauve_batch_size: 2
      embedder_batch_size: 8
      omp_num_threads: 1

  mac_m1:
    description: "MacBook Apple M1, 16 GB unified RAM — local dev and eval only"
    hardware:
      cpu_cores: 8
      ram_gb: 16
      gpu: "Apple M1 (MPS)"
      disk_gb: null        # depends on machine
    python_env:
      conda_env: med_search
      device: mps          # torch backend for Apple Silicon

    # Fine-tuning is not recommended on M1 (slow, no 4-bit CUDA kernels).
    # Use this profile for data preparation, evaluation, and quick inference checks.
    finetune:
      enabled: false
      reason: "Unsloth / bitsandbytes 4-bit QLoRA requires CUDA; MPS not supported"

    inference:
      device: mps
      load_in_4bit: false  # bitsandbytes unavailable; use full or 8-bit via llama.cpp
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256
      do_sample: true
      batch_size: 1

    eval:
      mauve_batch_size: 4
      embedder_batch_size: 16
      omp_num_threads: 1   # required to avoid segfault on macOS

  ubuntu_t4:
    description: "Ubuntu 22.04, Tesla T4 16 GB VRAM, 8 vCPU, 16 GB RAM, 120 GB disk"
    hardware:
      cpu_cores: 8
      ram_gb: 16
      vram_gb: 16
      gpu: "NVIDIA Tesla T4"
      disk_gb: 120
    python_env:
      device: cuda

    finetune:
      enabled: true
      # Training hyperparameters live in configs/train.yaml.

    inference:
      device: cuda
      load_in_4bit: true
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256
      do_sample: true
      batch_size: 8

    eval:
      mauve_batch_size: 32
      embedder_batch_size: 64
      omp_num_threads: null  # no override needed on Linux
